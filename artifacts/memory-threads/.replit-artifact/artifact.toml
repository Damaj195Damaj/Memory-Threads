kind = "web"
previewPath = "/"
title = "Memory Threads"
version = "1.0.0"
id = "artifacts/memory-threads"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20840

[services.development]
run = "pnpm --filter @workspace/memory-threads run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/memory-threads", "run", "build" ]
serve = "static"
publicDir = "artifacts/memory-threads/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20840"
BASE_PATH = "/"
